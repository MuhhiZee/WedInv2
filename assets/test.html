<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@300;400;500;600&family=Great+Vibes&display=swap');

/* Break out dari container Streamlit biar bisa full */
.wed-outer{
  position:relative;
  width:100vw;
  margin-left:calc(-50vw + 50%);
  margin-right:calc(-50vw + 50%);
  margin-top:-5rem;
  height:100vh;
  height:100dvh;
  background:#0a0a0c;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  isolation:isolate;
}
.wed-card{
  position:relative;
  width:100%;
  height:100%;
  max-width:480px;
  overflow:hidden;
  background:#FFF8E9;
  box-shadow:0 0 40px rgba(0,0,0,0.4);
}
/* Di desktop, beri batas tinggi biar tidak terlalu tinggi */
@media (min-width: 768px){
 .wed-outer{height:100vh;}
 .wed-card{height:100vh; max-height:900px; border-radius:0;}
}

.wed-bg{
  position:absolute;
  inset:0;
  background-image:url("data:image/jpeg;base64,PASTE_BASE64_IMAGE_DISINI"); /* ganti dengan base64 kamu */
  background-size:cover;
  background-position:50% 38%;
  animation:kenOut 5s cubic-bezier(.16,1,.3,1) forwards;
}

@keyframes kenOut{0%{transform:scale(1.35)} 100%{transform:scale(1)}}
@keyframes breath{0%{transform:scale(1)} 100%{transform:scale(1.05)}}
@keyframes fadeUp{0%{opacity:0; transform:translateY(22px)} 100%{opacity:1; transform:translateY(0)}}
@keyframes scaleX{0%{transform:scaleX(0)} 100%{transform:scaleX(1)}}
@keyframes floatBokeh{0%{transform:translate3d(0,30vh,0) scale(0.8); opacity:0} 15%{opacity:0.7} 85%{opacity:0.6} 100%{transform:translate3d(12px,-110vh,0) scale(1.2); opacity:0}}
@keyframes sparkleP{0%,100%{opacity:0.15; transform:scale(0.6)} 50%{opacity:1; transform:scale(1.15)}}
@keyframes bounce{0%,100%{transform:translateY(0); opacity:0.9} 50%{transform:translateY(6px); opacity:0.55}}
@keyframes lightRay{0%{opacity:0.1} 50%{opacity:0.28} 100%{opacity:0.1}}
@keyframes slowGlow{0%{opacity:0.6} 100%{opacity:1}}

.wed-overlay{position:absolute; inset:0; z-index:1; background:linear-gradient(180deg,rgba(90,110,90,0.25) 0%,rgba(90,110,90,0.08) 35%,rgba(255,248,233,0.18) 68%,rgba(255,248,233,0.55) 100%);}
.wash{position:absolute; z-index:2; pointer-events:none; border-radius:100%; filter:blur(42px);}
.w1{top:-8%; left:-18%; width:62%; height:38%; background:radial-gradient(ellipse 70% 65% at 50% 50%, rgba(143,168,143,0.42) 0%, rgba(143,168,143,0.18) 45%, transparent 78%);}
.w2{top:-12%; right:-20%; width:58%; height:36%; background:radial-gradient(ellipse 75% 70% at 50% 50%, rgba(232,200,122,0.44) 0%, rgba(232,200,122,0.16) 48%, transparent 80%);}
.w3{bottom:-10%; left:-22%; width:66%; height:42%; background:radial-gradient(ellipse 68% 60% at 50% 50%, rgba(232,200,122,0.34) 0%, rgba(232,200,122,0.10) 55%, transparent 82%);}
.w4{bottom:-12%; right:-18%; width:70%; height:44%; background:radial-gradient(ellipse 72% 66% at 50% 50%, rgba(143,168,143,0.36) 0%, rgba(143,168,143,0.12) 50%, transparent 84%);}
.light-rays{position:absolute; inset:-20%; z-index:3; pointer-events:none; background:repeating-linear-gradient(100deg, transparent 0, transparent 42px, rgba(255,248,220,0.09) 42px, rgba(255,248,220,0.14) 43px, transparent 44px); animation:lightRay 7s ease-in-out infinite; mix-blend-mode:soft-light;}
.bokeh-layer{position:absolute; inset:0; z-index:4; pointer-events:none; overflow:hidden;}
.b-dot{position:absolute; bottom:-6%; border-radius:50%; background:radial-gradient(circle, #F5D78E 0%, #E8C87A 55%, transparent 78%); box-shadow:0 0 8px rgba(245,215,142,0.6); filter:blur(0.6px); animation:floatBokeh linear infinite;}
.glow{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:85%; height:58%; background:radial-gradient(ellipse at center, rgba(255,248,220,0.22) 0%, rgba(232,200,122,0.10) 38%, transparent 72%); filter:blur(18px); z-index:3; animation:slowGlow 5s ease-in-out infinite alternate;}
.sparkles{position:absolute; inset:0; z-index:6; pointer-events:none;}
.sp{position:absolute; width:3px; height:3px; border-radius:50%; background:#FFF6D0; box-shadow:0 0 6px 1.5px rgba(255,246,180,0.9), 0 0 14px 3px rgba(232,200,122,0.45); animation:sparkleP 2.8s ease-in-out infinite;}
.sp-cross{position:absolute; top:23.5%; left:49.2%; width:10px; height:10px; transform:rotate(45deg); background:linear-gradient(transparent 45%, rgba(255,246,208,0.9) 50%, transparent 55%), linear-gradient(90deg, transparent 45%, rgba(255,246,208,0.9) 50%, transparent 55%); animation:sparkleP 3.2s ease-in-out 0.3s infinite;}

.content{position:relative; z-index:10; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 28px;}
.sub{margin:0; font-family:'Cormorant Garamond',serif; font-weight:300; font-size:12px; letter-spacing:0.42em; color:#FFF8E9; text-transform:uppercase; opacity:0; animation:fadeUp 1.1s cubic-bezier(.16,1,.3,1) forwards 0.8s; text-shadow:0 1px 10px rgba(0,0,0,0.28);}
.name{margin-top:16px; line-height:0.92; font-family:'Great Vibes',cursive; font-size:64px; color:#FFFDF5; font-weight:400; opacity:0; animation:fadeUp 1.2s cubic-bezier(.16,1,.3,1) forwards 1.2s; text-shadow:0 1px 0 rgba(255,255,255,0.6), 0 2px 18px rgba(0,0,0,0.18), 0 0 28px rgba(255,253,245,0.55);}
.line{margin-top:20px; height:1px; width:62px; background:#E8C87A; opacity:0; transform:scaleX(0); animation:scaleX 0.9s cubic-bezier(.16,1,.3,1) forwards 1.8s; box-shadow:0 0 10px rgba(232,200,122,0.5);}
.date{margin-top:16px; font-family:'Cormorant Garamond',serif; font-size:16px; letter-spacing:0.26em; color:#FFF8E9; text-transform:uppercase; opacity:0; animation:fadeUp 1s cubic-bezier(.16,1,.3,1) forwards 2s; text-shadow:0 1px 12px rgba(0,0,0,0.28);}

.scroll{position:absolute; bottom:0; left:0; right:0; z-index:12; display:flex; flex-direction:column; align-items:center; padding-bottom:28px; pointer-events:none;}
.scroll-inner{display:flex; flex-direction:column; align-items:center; gap:7px; opacity:0; animation:fadeUp 0.9s ease forwards 2.8s;}
.scroll-txt{font-family:'Cormorant Garamond',serif; font-size:9.5px; letter-spacing:0.34em; text-transform:uppercase; color:rgba(255,248,233,0.85); text-shadow:0 1px 8px rgba(0,0,0,0.35);}
.scroll-circle{width:18px; height:18px; border-radius:50%; border:1px solid rgba(255,248,233,0.5); display:flex; align-items:center; justify-content:center; animation:bounce 1.8s ease-in-out infinite;}

.wed-frame{position:absolute; inset:18px; z-index:5; border:1px solid rgba(232,200,122,0.35); pointer-events:none; box-shadow:inset 0 0 0 1px rgba(255,255,255,0.3)}
</style>
</head>

<script>
// Ganti animasi kenBurns jadi breathing setelah 5 detik
setTimeout(function(){
  var bg=document.getElementById('wedBg');
  if(bg) bg.style.animation='breath 12s ease-in-out infinite alternate';

// Trigger playables complete saat user scroll atau tap
document.addEventListener('click', function(){
